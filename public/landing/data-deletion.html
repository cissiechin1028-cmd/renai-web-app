  <h1>データ削除について</h1>

  <p>
    相談履歴は最大30日間保存され、その後自動的に削除されます。
  </p>

  <p>
    保存中の相談履歴を削除したい場合は、LINEで
    <strong>「履歴削除」</strong>
    と送信してください。
  </p>

  <h2>削除される内容</h2>
  <ul>
    <li>相談内容</li>
    <li>AIによる回答内容</li>
  </ul>

  <h2>削除されない内容</h2>
  <ul>
    <li>決済情報</li>
    <li>利用状況に関する最低限の記録</li>
    <li>不正利用防止のために必要な情報</li>
  </ul>
